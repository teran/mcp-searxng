name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --config .golangci.yml

      - name: Run tests
        run: go test -race -coverprofile=coverage.out -count=1 ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | sed 's/%//')
          echo "### Coverage: ${COVERAGE}% (threshold: 85%)" >> "$GITHUB_STEP_SUMMARY"
          echo "Coverage: ${COVERAGE}%"
          THRESHOLD=85
          if awk "BEGIN {exit !($COVERAGE < $THRESHOLD)}"; then
            echo "❌ Coverage ${COVERAGE}% is below threshold of ${THRESHOLD}%"
            echo "❌ Coverage ${COVERAGE}% is below threshold of ${THRESHOLD}%" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets threshold of ${THRESHOLD}%"

      - name: Upload coverage profile
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage.out
          retention-days: 7
